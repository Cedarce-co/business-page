# Render web service — https://render.com/docs/deploy-nextjs-app
services:
  - type: web
    name: cedarce
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: cedarce
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false
      - key: ADMIN_EMAILS
        sync: false

databases:
  - name: cedarce
    plan: starter
    databaseName: cedarce
    user: cedarce
